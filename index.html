<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Darts Scorer</title>
    <!-- PeerJS for WebRTC Peer-to-Peer Networking -->
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --active: #27ae60;
            --bg: #ecf0f1;
            --panel: #ffffff;
            --border: #bdc3c7;
            --alert: #e74c3c;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { margin: 0; padding: 20px; background-color: var(--bg); display: flex; justify-content: center; }
        #app { background: var(--panel); max-width: 900px; width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }
        
        /* Lobby Screen */
        .lobby-panel { max-width: 500px; margin: 0 auto; text-align: center; }
        .lobby-box { border: 2px dashed var(--border); padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #f8f9fa; }
        .id-display { font-size: 2em; font-family: monospace; font-weight: bold; color: var(--primary); letter-spacing: 2px; margin: 10px 0; user-select: all; }
        input[type="text"], select { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; padding: 12px 20px; font-size: 16px; border-radius: 4px; width: 100%; transition: background 0.2s; }
        button:hover { background: #1a252f; }
        button:disabled { background: var(--border); cursor: not-allowed; }
        .status { margin-top: 15px; font-weight: bold; color: var(--alert); }

        /* Match Screen */
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.1em; font-weight: bold; border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        .connection-status { font-size: 0.8em; padding: 4px 8px; background: var(--active); color: white; border-radius: 12px; }
        .boards { display: flex; border: 2px solid var(--border); border-radius: 4px; overflow: hidden; }
        .player-board { flex: 1; display: flex; flex-direction: column; }
        .player-board:first-child { border-right: 2px solid var(--border); }
        .player-info { padding: 15px; text-align: center; border-bottom: 2px solid var(--border); background: #f8f9fa; transition: background 0.2s; }
        .player-info.is-turn { background: #e8f5e9; border-top: 4px solid var(--active); }
        .player-name { font-size: 1.5em; font-weight: bold; margin: 0 0 10px 0; }
        .score-remaining { font-size: 4em; font-weight: bold; line-height: 1; margin-bottom: 10px; }
        .stats { font-size: 0.9em; color: #555; display: flex; justify-content: space-around; }
        
        .history { flex: 1; min-height: 250px; max-height: 300px; overflow-y: auto; background: #fff; }
        .history table { width: 100%; border-collapse: collapse; text-align: center; }
        .history th { background: #eee; padding: 5px; font-size: 0.8em; position: sticky; top: 0; }
        .history td { padding: 8px 5px; border-bottom: 1px solid #eee; }
        .history tr:nth-child(even) { background: #fafafa; }
        .score-col { font-weight: bold; }
        
        /* Input Area */
        .input-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .score-display { width: 200px; height: 60px; font-size: 2em; text-align: center; margin-bottom: 15px; border: 2px solid var(--primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; width: 100%; }
        .numpad button { padding: 15px; font-size: 1.5em; background: #fff; border: 1px solid var(--border); color: black; }
        .numpad button:active { background: #e0e0e0; }
        .btn-enter { background: var(--active) !important; color: white !important; grid-column: span 1; }
        .btn-clear { background: var(--alert) !important; color: white !important; }
        .btn-undo { background: #f39c12 !important; color: white !important; grid-column: span 3; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal { background: white; padding: 20px; border-radius: 8px; text-align: center; max-width: 400px; }
        .modal button { margin: 5px; width: auto; display: inline-block; }
    </style>
</head>
<body>

<div id="app">
    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen active">
        <div class="lobby-panel">
            <h2>Online Match Setup</h2>
            <p>Share your ID with a friend, or connect to theirs.</p>
            
            <div class="lobby-box">
                <div>Your Shareable ID:</div>
                <div class="id-display" id="my-peer-id">Loading...</div>
                <button onclick="copyMyId()" id="copy-btn">Copy ID</button>
            </div>

            <div class="lobby-box">
                <input type="text" id="my-name" placeholder="Enter your player name" value="Player 1">
                <input type="text" id="remote-id" placeholder="Paste friend's ID here to join">
                <button onclick="connectToPeer()" id="connect-btn">Connect & Start Match</button>
                <div class="status" id="lobby-status"></div>
            </div>
        </div>
    </div>

    <!-- Match Screen -->
    <div id="match-screen" class="screen">
        <div class="match-header">
            <div>First to <span id="target-legs">3</span> Legs</div>
            <div class="connection-status">Online Sync Active</div>
        </div>
        
        <div class="boards">
            <div class="player-board">
                <div id="p1-panel" class="player-info">
                    <h2 class="player-name" id="p1-name">Player 1</h2>
                    <div class="score-remaining" id="p1-rem">501</div>
                    <div class="stats">
                        <span>Legs: <strong id="p1-legs">0</strong></span>
                        <span>Avg: <strong id="p1-avg">0.00</strong></span>
                    </div>
                </div>
                <div class="history">
                    <table>
                        <thead><tr><th>No.</th><th>Score</th><th>Rem</th></tr></thead>
                        <tbody id="p1-history"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="player-board">
                <div id="p2-panel" class="player-info">
                    <h2 class="player-name" id="p2-name">Player 2</h2>
                    <div class="score-remaining" id="p2-rem">501</div>
                    <div class="stats">
                        <span>Legs: <strong id="p2-legs">0</strong></span>
                        <span>Avg: <strong id="p2-avg">0.00</strong></span>
                    </div>
                </div>
                <div class="history">
                    <table>
                        <thead><tr><th>No.</th><th>Score</th><th>Rem</th></tr></thead>
                        <tbody id="p2-history"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="score-display" id="current-input"></div>
            <div class="numpad">
                <button onclick="appendNum(1)">1</button>
                <button onclick="appendNum(2)">2</button>
                <button onclick="appendNum(3)">3</button>
                <button onclick="appendNum(4)">4</button>
                <button onclick="appendNum(5)">5</button>
                <button onclick="appendNum(6)">6</button>
                <button onclick="appendNum(7)">7</button>
                <button onclick="appendNum(8)">8</button>
                <button onclick="appendNum(9)">9</button>
                <button class="btn-clear" onclick="clearInput()">C</button>
                <button onclick="appendNum(0)">0</button>
                <button class="btn-enter" onclick="submitScore()">Enter</button>
                <button class="btn-undo" onclick="undo()">Undo</button>
            </div>
        </div>
    </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkout-modal">
    <div class="modal">
        <h3>Leg Won!</h3>
        <p>How many darts to checkout?</p>
        <div>
            <button onclick="completeLeg(1)">1 Dart</button>
            <button onclick="completeLeg(2)">2 Darts</button>
            <button onclick="completeLeg(3)">3 Darts</button>
        </div>
    </div>
</div>

<script>
    // --- Networking (PeerJS) ---
    let peer = null;
    let connection = null;
    let localPlayerNum = 1; // 1 if Host, 2 if Joiner

    function initNetwork() {
        // Generate a random, readable 6-character ID
        const shortId = Math.random().toString(36).substring(2, 8).toUpperCase();
        
        peer = new Peer(shortId, { debug: 2 });

        peer.on('open', id => {
            document.getElementById('my-peer-id').innerText = id;
        });

        // When someone connects to US (We are the host)
        peer.on('connection', conn => {
            connection = conn;
            localPlayerNum = 1; // We are player 1
            state.p1.name = document.getElementById('my-name').value || "Host";
            setupConnection();
        });

        peer.on('error', err => {
            document.getElementById('lobby-status').innerText = "Network Error: " + err.type;
        });
    }

    function connectToPeer() {
        const remoteId = document.getElementById('remote-id').value.toUpperCase().trim();
        if (!remoteId) return;
        
        document.getElementById('lobby-status').innerText = "Connecting...";
        
        // We are joining (Player 2)
        localPlayerNum = 2;
        connection = peer.connect(remoteId, { reliable: true });
        setupConnection();
    }

    function setupConnection() {
        connection.on('open', () => {
            // Send our name immediately
            const myName = document.getElementById('my-name').value || (localPlayerNum === 1 ? "Player 1" : "Player 2");
            connection.send({ type: 'HANDSHAKE', name: myName, player: localPlayerNum });
            
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('match-screen').classList.add('active');
            updateUI();
        });

        connection.on('data', data => {
            if (data.type === 'HANDSHAKE') {
                // Register the opponent's name
                if (data.player === 1) state.p1.name = data.name;
                if (data.player === 2) state.p2.name = data.name;
                updateUI();
                
                // If we are the host, push the initial match state to the joiner
                if (localPlayerNum === 1) broadcastState();
            } else if (data.type === 'STATE_SYNC') {
                // Overwrite local state with network state
                state = data.state;
                updateUI();
            }
        });

        connection.on('close', () => {
            alert("Connection lost. Please refresh and reconnect.");
        });
    }

    function broadcastState() {
        if (connection && connection.open) {
            connection.send({ type: 'STATE_SYNC', state: state });
        }
    }

    function copyMyId() {
        const idText = document.getElementById('my-peer-id').innerText;
        navigator.clipboard.writeText(idText);
        const btn = document.getElementById('copy-btn');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy ID", 2000);
    }

    // --- Game Logic ---
    let state = {
        settings: { startScore: 501, targetLegs: 3 },
        p1: { name: "Player 1", legs: 0, rem: 501, history: [], totalScored: 0, totalDarts: 0 },
        p2: { name: "Player 2", legs: 0, rem: 501, history: [], totalScored: 0, totalDarts: 0 },
        turn: 1, 
        startingPlayer: 1,
        globalHistory: [] 
    };

    let currentInput = "";
    const impossibleScores = [163, 166, 169, 172, 173, 175, 176, 178, 179];

    function appendNum(num) {
        // Optional constraint: Only allow typing if it's our turn
        // if (state.turn !== localPlayerNum) return; 

        if (currentInput.length < 3) {
            currentInput += num;
            updateInputUI();
        }
    }

    function clearInput() { currentInput = ""; updateInputUI(); }
    function updateInputUI() { document.getElementById('current-input').innerText = currentInput; }

    function submitScore() {
        if (currentInput === "") return;
        const score = parseInt(currentInput);
        currentInput = "";
        updateInputUI();

        if (score > 180 || impossibleScores.includes(score)) {
            alert("Invalid darts score.");
            return;
        }

        const p = state.turn === 1 ? state.p1 : state.p2;
        
        if (score > p.rem || p.rem - score === 1) { // Bust
            recordScore(p, 0, "Bust (" + score + ")", 3);
            switchTurn();
        } else if (score === p.rem) { // Checkout Attempt
            p.pendingCheckoutScore = score; 
            document.getElementById('checkout-modal').style.display = 'flex';
        } else { // Normal score
            recordScore(p, score, score, 3);
            switchTurn();
        }
    }

    function recordScore(player, actualDeduction, displayScore, dartsUsed) {
        state.globalHistory.push(JSON.parse(JSON.stringify(state))); // Save for undo
        player.rem -= actualDeduction;
        player.totalScored += actualDeduction;
        player.totalDarts += dartsUsed;
        player.history.push({ throwNum: player.history.length + 1, score: displayScore, rem: player.rem });
    }

    function completeLeg(checkoutDarts) {
        document.getElementById('checkout-modal').style.display = 'none';
        const p = state.turn === 1 ? state.p1 : state.p2;
        
        recordScore(p, p.pendingCheckoutScore, p.pendingCheckoutScore, checkoutDarts);
        p.legs++;

        if (p.legs >= state.settings.targetLegs) {
            alert(p.name + " Wins the Match!");
            resetLeg(); // Optional auto-reset
        } else {
            state.startingPlayer = state.startingPlayer === 1 ? 2 : 1;
            resetLeg();
        }
        updateUI();
        broadcastState();
    }

    function resetLeg() {
        state.p1.rem = state.settings.startScore;
        state.p2.rem = state.settings.startScore;
        state.p1.history = [];
        state.p2.history = [];
        state.turn = state.startingPlayer;
        state.globalHistory = [];
    }

    function switchTurn() {
        state.turn = state.turn === 1 ? 2 : 1;
        updateUI();
        broadcastState(); // Sync network every time a turn finishes
    }

    function undo() {
        if (state.globalHistory.length === 0) return;
        state = state.globalHistory.pop();
        currentInput = "";
        updateInputUI();
        updateUI();
        broadcastState();
    }

    // --- UI Updating ---
    function calculateAverage(player) {
        if (player.totalDarts === 0) return "0.00";
        return ((player.totalScored / player.totalDarts) * 3).toFixed(2);
    }

    function renderHistory(playerHistory, elementId) {
        const tbody = document.getElementById(elementId);
        tbody.innerHTML = "";
        [...playerHistory].reverse().forEach(h => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${h.throwNum}</td><td class="score-col">${h.score}</td><td>${h.rem}</td>`;
            tbody.appendChild(tr);
        });
    }

    function updateUI() {
        document.getElementById('p1-name').innerText = state.p1.name;
        document.getElementById('p2-name').innerText = state.p2.name;
        document.getElementById('p1-rem').innerText = state.p1.rem;
        document.getElementById('p2-rem').innerText = state.p2.rem;
        document.getElementById('p1-legs').innerText = state.p1.legs;
        document.getElementById('p2-legs').innerText = state.p2.legs;
        document.getElementById('p1-avg').innerText = calculateAverage(state.p1);
        document.getElementById('p2-avg').innerText = calculateAverage(state.p2);

        renderHistory(state.p1.history, 'p1-history');
        renderHistory(state.p2.history, 'p2-history');

        document.getElementById('p1-panel').className = 'player-info' + (state.turn === 1 ? ' is-turn' : '');
        document.getElementById('p2-panel').className = 'player-info' + (state.turn === 2 ? ' is-turn' : '');
    }

    // Keyboard support
    document.addEventListener('keydown', function(event) {
        if (document.getElementById('match-screen').classList.contains('active') && 
            document.getElementById('checkout-modal').style.display !== 'flex') {
            if (event.key >= '0' && event.key <= '9') appendNum(event.key);
            else if (event.key === 'Enter') submitScore();
            else if (event.key === 'Backspace') { currentInput = currentInput.slice(0, -1); updateInputUI(); }
            else if (event.key === 'Escape' || event.key.toLowerCase() === 'c') clearInput();
        }
    });

    // Boot up
    initNetwork();
</script>

</body>
</html>
