<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darts Scorer</title>
    <style>
        :root {
            --primary: #2c3e50;
            --active: #27ae60;
            --bg: #ecf0f1;
            --panel: #ffffff;
            --border: #bdc3c7;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 20px; background-color: var(--bg); display: flex; justify-content: center; }
        #app { background: var(--panel); max-width: 900px; width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Screens */
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }
        
        /* Setup Screen */
        .setup-form { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .setup-form label { font-weight: bold; }
        .setup-form input, .setup-form select, .setup-form button { padding: 10px; font-size: 16px; border: 1px solid var(--border); border-radius: 4px; }
        .setup-form button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .setup-form button:hover { background: #1a252f; }

        /* Match Screen */
        .match-header { text-align: center; margin-bottom: 20px; font-size: 1.2em; font-weight: bold; }
        .boards { display: flex; border: 2px solid var(--border); border-radius: 4px; overflow: hidden; }
        .player-board { flex: 1; display: flex; flex-direction: column; }
        .player-board:first-child { border-right: 2px solid var(--border); }
        .player-info { padding: 15px; text-align: center; border-bottom: 2px solid var(--border); background: #f8f9fa; transition: background 0.2s; }
        .player-info.is-turn { background: #e8f5e9; border-top: 4px solid var(--active); }
        .player-name { font-size: 1.5em; font-weight: bold; margin: 0 0 10px 0; }
        .score-remaining { font-size: 4em; font-weight: bold; line-height: 1; margin-bottom: 10px; }
        .stats { font-size: 0.9em; color: #555; display: flex; justify-content: space-around; }
        
        .history { flex: 1; min-height: 250px; max-height: 300px; overflow-y: auto; background: #fff; }
        .history table { width: 100%; border-collapse: collapse; text-align: center; }
        .history th { background: #eee; padding: 5px; font-size: 0.8em; position: sticky; top: 0; }
        .history td { padding: 8px 5px; border-bottom: 1px solid #eee; }
        .history tr:nth-child(even) { background: #fafafa; }
        .score-col { font-weight: bold; }
        
        /* Input Area */
        .input-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .score-display { width: 200px; height: 60px; font-size: 2em; text-align: center; margin-bottom: 15px; border: 2px solid var(--primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; width: 100%; }
        .numpad button { padding: 15px; font-size: 1.5em; font-weight: bold; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
        .numpad button:active { background: #e0e0e0; }
        .btn-enter { background: var(--active) !important; color: white; border: none !important; }
        .btn-clear { background: #e74c3c !important; color: white; border: none !important; }
        .btn-undo { background: #f39c12 !important; color: white; border: none !important; grid-column: span 3; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal { background: white; padding: 20px; border-radius: 8px; text-align: center; }
        .modal button { margin: 5px; padding: 10px 20px; font-size: 1.2em; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
        <h2 style="text-align:center;">Darts Match Setup</h2>
        <div class="setup-form">
            <label>Player 1 Name</label>
            <input type="text" id="setup-p1-name" value="Player 1">
            <label>Player 2 Name</label>
            <input type="text" id="setup-p2-name" value="Player 2">
            <label>Starting Score</label>
            <select id="setup-score">
                <option value="501">501</option>
                <option value="301">301</option>
                <option value="701">701</option>
            </select>
            <label>First to (Legs)</label>
            <select id="setup-legs">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="5">5</option>
                <option value="7">7</option>
            </select>
            <button onclick="startMatch()">Start Match</button>
        </div>
    </div>

    <!-- Match Screen -->
    <div id="match-screen" class="screen">
        <div class="match-header">
            First to <span id="target-legs">3</span> Legs
        </div>
        
        <div class="boards">
            <!-- Player 1 -->
            <div class="player-board">
                <div id="p1-panel" class="player-info">
                    <h2 class="player-name" id="p1-name">Player 1</h2>
                    <div class="score-remaining" id="p1-rem">501</div>
                    <div class="stats">
                        <span>Legs: <strong id="p1-legs">0</strong></span>
                        <span>Avg: <strong id="p1-avg">0.00</strong></span>
                    </div>
                </div>
                <div class="history">
                    <table>
                        <thead><tr><th>Throw</th><th>Score</th><th>Rem</th></tr></thead>
                        <tbody id="p1-history"></tbody>
                    </table>
                </div>
            </div>
            <!-- Player 2 -->
            <div class="player-board">
                <div id="p2-panel" class="player-info">
                    <h2 class="player-name" id="p2-name">Player 2</h2>
                    <div class="score-remaining" id="p2-rem">501</div>
                    <div class="stats">
                        <span>Legs: <strong id="p2-legs">0</strong></span>
                        <span>Avg: <strong id="p2-avg">0.00</strong></span>
                    </div>
                </div>
                <div class="history">
                    <table>
                        <thead><tr><th>Throw</th><th>Score</th><th>Rem</th></tr></thead>
                        <tbody id="p2-history"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-section">
            <div class="score-display" id="current-input"></div>
            <div class="numpad">
                <button onclick="appendNum(1)">1</button>
                <button onclick="appendNum(2)">2</button>
                <button onclick="appendNum(3)">3</button>
                <button onclick="appendNum(4)">4</button>
                <button onclick="appendNum(5)">5</button>
                <button onclick="appendNum(6)">6</button>
                <button onclick="appendNum(7)">7</button>
                <button onclick="appendNum(8)">8</button>
                <button onclick="appendNum(9)">9</button>
                <button class="btn-clear" onclick="clearInput()">C</button>
                <button onclick="appendNum(0)">0</button>
                <button class="btn-enter" onclick="submitScore()">Enter</button>
                <button class="btn-undo" onclick="undo()">Undo Last Score</button>
            </div>
        </div>
    </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkout-modal">
    <div class="modal">
        <h3>Leg Won!</h3>
        <p>How many darts did it take to checkout?</p>
        <div>
            <button onclick="completeLeg(1)">1 Dart</button>
            <button onclick="completeLeg(2)">2 Darts</button>
            <button onclick="completeLeg(3)">3 Darts</button>
        </div>
    </div>
</div>

<!-- Match Winner Modal -->
<div class="modal-overlay" id="winner-modal">
    <div class="modal">
        <h2 id="winner-text">Player Wins!</h2>
        <button onclick="location.reload()">New Match</button>
    </div>
</div>

<script>
    // Game State
    let state = {
        settings: { startScore: 501, targetLegs: 3 },
        p1: { name: "", legs: 0, rem: 501, history: [], totalScored: 0, totalDarts: 0 },
        p2: { name: "", legs: 0, rem: 501, history: [], totalScored: 0, totalDarts: 0 },
        turn: 1, // 1 or 2
        startingPlayer: 1,
        currentInput: "",
        globalHistory: [] // For undo functionality
    };

    const impossibleScores = [163, 166, 169, 172, 173, 175, 176, 178, 179];

    function startMatch() {
        state.settings.startScore = parseInt(document.getElementById('setup-score').value);
        state.settings.targetLegs = parseInt(document.getElementById('setup-legs').value);
        state.p1.name = document.getElementById('setup-p1-name').value || "Player 1";
        state.p2.name = document.getElementById('setup-p2-name').value || "Player 2";
        
        document.getElementById('target-legs').innerText = state.settings.targetLegs;
        document.getElementById('p1-name').innerText = state.p1.name;
        document.getElementById('p2-name').innerText = state.p2.name;

        resetLeg();
        
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('match-screen').classList.add('active');
        updateUI();
    }

    function appendNum(num) {
        if (state.currentInput.length < 3) {
            state.currentInput += num;
            updateInputUI();
        }
    }

    function clearInput() {
        state.currentInput = "";
        updateInputUI();
    }

    function updateInputUI() {
        document.getElementById('current-input').innerText = state.currentInput;
    }

    function submitScore() {
        if (state.currentInput === "") return;
        const score = parseInt(state.currentInput);
        state.currentInput = "";
        updateInputUI();

        if (score > 180 || impossibleScores.includes(score)) {
            alert("Invalid darts score.");
            return;
        }

        const p = state.turn === 1 ? state.p1 : state.p2;
        
        if (score > p.rem || p.rem - score === 1) {
            // Bust
            recordScore(p, 0, "Bust (" + score + ")", 3);
            switchTurn();
        } else if (score === p.rem) {
            // Checkout
            document.getElementById('checkout-modal').style.display = 'flex';
            // Save temporary state for the checkout
            p.pendingCheckoutScore = score; 
        } else {
            // Normal score
            recordScore(p, score, score, 3);
            switchTurn();
        }
    }

    function recordScore(player, actualDeduction, displayScore, dartsUsed) {
        state.globalHistory.push(JSON.parse(JSON.stringify(state))); // Snapshot for undo
        
        player.rem -= actualDeduction;
        player.totalScored += actualDeduction;
        player.totalDarts += dartsUsed;
        
        player.history.push({
            throwNum: player.history.length + 1,
            score: displayScore,
            rem: player.rem
        });
    }

    function completeLeg(checkoutDarts) {
        document.getElementById('checkout-modal').style.display = 'none';
        const p = state.turn === 1 ? state.p1 : state.p2;
        
        recordScore(p, p.pendingCheckoutScore, p.pendingCheckoutScore, checkoutDarts);
        p.legs++;

        if (p.legs >= state.settings.targetLegs) {
            document.getElementById('winner-text').innerText = p.name + " Wins the Match!";
            document.getElementById('winner-modal').style.display = 'flex';
        } else {
            state.startingPlayer = state.startingPlayer === 1 ? 2 : 1;
            resetLeg();
            updateUI();
        }
    }

    function resetLeg() {
        state.p1.rem = state.settings.startScore;
        state.p2.rem = state.settings.startScore;
        state.p1.history = [];
        state.p2.history = [];
        state.turn = state.startingPlayer;
        state.globalHistory = [];
    }

    function switchTurn() {
        state.turn = state.turn === 1 ? 2 : 1;
        updateUI();
    }

    function undo() {
        if (state.globalHistory.length === 0) return;
        const previousState = state.globalHistory.pop();
        // Restore necessary state parts
        state.p1 = previousState.p1;
        state.p2 = previousState.p2;
        state.turn = previousState.turn;
        state.currentInput = "";
        updateInputUI();
        updateUI();
    }

    function calculateAverage(player) {
        if (player.totalDarts === 0) return "0.00";
        return ((player.totalScored / player.totalDarts) * 3).toFixed(2);
    }

    function renderHistory(playerHistory, elementId) {
        const tbody = document.getElementById(elementId);
        tbody.innerHTML = "";
        // Reverse to show newest at top
        const reversed = [...playerHistory].reverse();
        reversed.forEach(h => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${h.throwNum}</td><td class="score-col">${h.score}</td><td>${h.rem}</td>`;
            tbody.appendChild(tr);
        });
    }

    function updateUI() {
        document.getElementById('p1-rem').innerText = state.p1.rem;
        document.getElementById('p2-rem').innerText = state.p2.rem;
        document.getElementById('p1-legs').innerText = state.p1.legs;
        document.getElementById('p2-legs').innerText = state.p2.legs;
        
        document.getElementById('p1-avg').innerText = calculateAverage(state.p1);
        document.getElementById('p2-avg').innerText = calculateAverage(state.p2);

        renderHistory(state.p1.history, 'p1-history');
        renderHistory(state.p2.history, 'p2-history');

        document.getElementById('p1-panel').className = 'player-info' + (state.turn === 1 ? ' is-turn' : '');
        document.getElementById('p2-panel').className = 'player-info' + (state.turn === 2 ? ' is-turn' : '');
    }

    // Keyboard support
    document.addEventListener('keydown', function(event) {
        if (document.getElementById('match-screen').classList.contains('active') && 
            document.getElementById('checkout-modal').style.display !== 'flex' &&
            document.getElementById('winner-modal').style.display !== 'flex') {
            
            if (event.key >= '0' && event.key <= '9') {
                appendNum(event.key);
            } else if (event.key === 'Enter') {
                submitScore();
            } else if (event.key === 'Backspace') {
                state.currentInput = state.currentInput.slice(0, -1);
                updateInputUI();
            } else if (event.key === 'Escape' || event.key === 'c' || event.key === 'C') {
                clearInput();
            }
        }
    });
</script>

</body>
</html>
