<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sims Theory Test Pro</title>
    <style>
        :root {
            --primary: #d63384;      /* Soft Rose */
            --primary-hover: #ad2a6a;
            --bg: #fff5f7;           /* Blush background */
            --surface: #ffffff;
            --text-main: #4a148c;    /* Deep Purple text */
            --error: #c62828;
            --border: #f8bbd0;
            --radius: 12px;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: linear-gradient(135deg, #d63384 0%, #9c27b0 100%); color: white; width: 100%; padding: 2.5rem 0; text-align: center; }
        .container { background-color: var(--surface); max-width: 800px; width: 90%; margin: 2rem auto; padding: 2.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
        .section { display: none; }
        .section.active { display: block; }
        .hero-image { width: 100%; border-radius: var(--radius); margin-bottom: 1.5rem; }
        .action-btn { background-color: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        .action-btn:hover { background-color: var(--primary-hover); }
        .option-btn { padding: 18px; margin: 8px 0; border: 2px solid var(--border); border-radius: 8px; background: white; text-align: left; cursor: pointer; }
        .option-btn.selected { background-color: #fce4ec; border-color: var(--primary); color: var(--primary); }
        .timer { font-size: 22px; font-weight: 800; color: var(--error); }
    </style>
</head>
<body>

    <header>
        <h1>Sims Theory Test</h1>
    </header>

    <!-- MOCK TEST SELECTION -->
    <div class="container section active" id="mock-selection">
        <img src="banner.jpg" alt="Driving Theory" class="hero-image">
        <h2>Choose a Mock Test</h2>
        <p>Select a test below. Each mock contains exactly 50 randomized questions. You need 43 correct answers to pass within the 57-minute time limit.</p>
        
        <select id="mock-test-dropdown" class="styled-select" style="width: 100%; padding: 16px; margin-bottom: 24px; border: 2px solid var(--border); border-radius: 8px;">
            <option value="0">Mock Test 1</option>
            <option value="1">Mock Test 2</option>
            <option value="2">Mock Test 3</option>
            <option value="3">Mock Test 4</option>
            <option value="4">Mock Test 5</option>
            <option value="5">Mock Test 6</option>
            <option value="6">Mock Test 7</option>
            <option value="7">Mock Test 8</option>
            <option value="8">Mock Test 9</option>
            <option value="9">Mock Test 10</option>
        </select>

        <button class="action-btn" onclick="startDropdownTest()">Start 50-Question Exam</button>
    </div>

    <!-- ACTIVE TEST SCREEN -->
    <div class="container section" id="active-test">
        <div class="test-header">
            <h2 id="active-test-title" style="margin:0;">Test Name</h2>
            <div class="timer" id="timer-display">57:00</div>
        </div>
        
        <p id="question-tracker" style="font-weight: 600; color: var(--primary);">Question 1 of 50</p>
        <p id="question-text" style="font-size: 20px; font-weight: 700;"></p>
        
        <div class="options" id="options-container"></div>

        <div style="display: flex; justify-content: space-between; margin-top: 30px;">
            <button class="action-btn" onclick="prevQuestion()" style="background-color: #7b1fa2; width: 48%;">Previous</button>
            <button class="action-btn" id="next-btn" onclick="nextQuestion()" style="width: 48%;">Next Question</button>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="container section" id="test-results">
        <h2>Your Results</h2>
        <div id="result-summary" style="font-size: 18px; margin-bottom: 25px; padding: 20px; background-color: #fce4ec; border-left: 5px solid var(--primary);"></div>
        <h3 style="margin-top:30px;">Questions to Review:</h3>
        <div id="incorrect-answers-container"></div>
        <button class="action-btn" onclick="returnToMenu()">Return to Main Menu</button>
    </div>

    <script>
        const questionBank = [
            { q: "What is the national speed limit on a single carriageway for cars?", options: ["40 mph", "50 mph", "60 mph", "70 mph"], answer: 2 },
            { q: "What is the national speed limit on a dual carriageway for cars?", options: ["50 mph", "60 mph", "70 mph", "80 mph"], answer: 2 },
            { q: "You are approaching a red traffic light. What should you do?", options: ["Speed up", "Stop behind the white line", "Proceed if clear", "Sound your horn"], answer: 1 },
            { q: "When should you use your hazard warning lights?", options: ["When parked illegally", "When driving slowly in fog", "When your vehicle has broken down and is causing an obstruction", "To thank a driver for giving way"], answer: 2 },
            { q: "What shape is a STOP sign?", options: ["Circular", "Triangular", "Octagonal", "Rectangular"], answer: 2 },
            { q: "What shape is a 'Give Way' sign?", options: ["Upside-down triangle", "Circle", "Octagon", "Square"], answer: 0 },
            { q: "What does a circular traffic sign with a red border mean?", options: ["Warning", "Must do", "Prohibited/Order", "Information"], answer: 2 },
            { q: "What does a sign with a brown background show?", options: ["Tourist directions", "Primary routes", "Motorway routes", "Local routes"], answer: 0 },
            { q: "What color are the reflective studs between a motorway and its slip road?", options: ["Red", "Amber", "Green", "White"], answer: 2 },
            { q: "What color are the reflective studs on the left-hand edge of the motorway?", options: ["Red", "Amber", "Green", "White"], answer: 0 },
            { q: "What color are the reflective studs between the lanes on a motorway?", options: ["Red", "Amber", "Green", "White"], answer: 3 },
            { q: "What happens to stopping distances in icy conditions?", options: ["They double", "They stay the same", "They increase by up to 10 times", "They decrease"], answer: 2 },
            { q: "What happens to stopping distances in wet conditions?", options: ["They double", "They stay the same", "They increase by 10 times", "They halve"], answer: 0 },
            { q: "When is it safe to use front fog lights?", options: ["At any time", "When visibility is reduced to 100 metres (328 feet)", "When it is raining", "During twilight"], answer: 1 },
            { q: "Why is it dangerous to leave the clutch down or coast?", options: ["It uses more fuel", "It reduces the driver's control of the vehicle", "It causes engine wear", "It makes the steering heavier"], answer: 1 },
            { q: "Who is especially vulnerable at road junctions?", options: ["Lorry drivers", "Car drivers", "Motorcyclists and cyclists", "Bus drivers"], answer: 2 },
            { q: "You are approaching a zebra crossing. Pedestrians are waiting. What should you do?", options: ["Wave them across", "Sound your horn", "Prepare to slow down and stop", "Continue at the same speed"], answer: 2 },
            { q: "Why should you allow extra room for a motorcyclist on a windy day?", options: ["They may blow into your path", "They are allowed to ride in the middle", "They will stop quicker", "They travel faster"], answer: 0 },
            { q: "What is the speed limit for a car towing a trailer on a motorway?", options: ["50 mph", "60 mph", "70 mph", "40 mph"], answer: 1 },
            { q: "You break down on a motorway. Where should you stop?", options: ["The right-hand lane", "The middle lane", "The hard shoulder", "A slip road"], answer: 2 },
            { q: "You arrive at a motorcycle crash. The rider is unconscious. What is the first thing you should do?", options: ["Remove their helmet", "Move them off the road", "Warn other traffic", "Give them a drink"], answer: 2 },
            { q: "An injured person is suffering from shock. How can you help?", options: ["Offer them a warm drink", "Reassure them constantly", "Walk them around", "Leave them alone"], answer: 1 },
            { q: "Which document may the police ask you to produce after a collision?", options: ["Vehicle registration (V5C)", "Theory certificate", "Driving licence", "MOT certificate"], answer: 2 },
            { q: "Tailgating means:", options: ["Following another vehicle too closely", "Reversing into a space", "Driving with rear fog lights on", "Leaving a wide gap"], answer: 0 },
            { q: "You are driving a slow vehicle on a narrow road. Traffic is building up behind you. What should you do?", options: ["Keep driving at normal speed", "Pull in when you can to let vehicles pass", "Wave vehicles past", "Speed up"], answer: 1 },
            { q: "What should you do if another driver flashes their headlights at you?", options: ["Ignore them", "Flash back", "Understand they are warning you of their presence", "Assume they are giving way"], answer: 2 },
            { q: "Who has priority at an unmarked crossroads?", options: ["The larger vehicle", "No one has priority", "The vehicle on the right", "The vehicle going straight"], answer: 1 },
            { q: "You are at a pelican crossing. The red light changes to flashing amber. What does this mean?", options: ["Wait for green", "Go immediately", "Give way to pedestrians still on the crossing", "Pedestrians must wait"], answer: 2 },
            { q: "Where may you overtake on a one-way street?", options: ["Only on the left", "Only on the right", "On either the right or the left", "Overtaking is not allowed"], answer: 2 },
            { q: "What is the legal minimum tread depth for car tyres?", options: ["1.0 mm", "1.6 mm", "2.0 mm", "2.5 mm"], answer: 1 },
            { q: "How can you check if your vehicle's power steering is working before a journey?", options: ["Check the fluid", "Turn the steering wheel as you start the engine", "Check tyre pressures", "Look under the bonnet"], answer: 1 },
            { q: "What does it mean if your anti-lock brakes (ABS) warning light stays on?", options: ["Working perfectly", "The ABS has a fault and needs checking", "Change brake fluid", "Handbrake is applied"], answer: 1 },
            { q: "How can driving smoothly reduce your vehicle's impact on the environment?", options: ["By reducing exhaust emissions", "By extending battery life", "By keeping the engine cool", "By increasing stopping distances"], answer: 0 },
            { q: "What is a statutory off-road notification (SORN)?", options: ["A notification to tell DVLA a vehicle is not being used on the road", "A certificate of roadworthiness", "A parking permit", "An insurance document"], answer: 0 },
            { q: "What is the maximum fine for driving without insurance?", options: ["£500", "£1,000", "£2,500", "Unlimited"], answer: 3 },
            { q: "When must you have a valid MOT certificate for a new car?", options: ["After 1 year", "After 3 years", "After 5 years", "Immediately"], answer: 1 },
            { q: "What is a cover note?", options: ["A document issued before you receive your insurance certificate", "A MOT receipt", "A driving licence receipt", "A vehicle logbook"], answer: 0 },
            { q: "What is the typical overall stopping distance at 30 mph in good conditions?", options: ["12 metres (40 feet)", "23 metres (75 feet)", "36 metres (118 feet)", "53 metres (175 feet)"], answer: 1 },
            { q: "What is the typical overall stopping distance at 50 mph in good conditions?", options: ["36 metres", "53 metres (175 feet)", "73 metres", "96 metres"], answer: 1 },
            { q: "What is the typical overall stopping distance at 70 mph in good conditions?", options: ["53 metres", "73 metres", "96 metres (315 feet)", "120 metres"], answer: 2 },
            { q: "What type of crossing uses sensors to detect if people are still crossing?", options: ["Zebra", "Pelican", "Puffin", "Toucan"], answer: 2 },
            { q: "Who can cross at a Toucan crossing?", options: ["Pedestrians only", "Cyclists only", "Pedestrians and cyclists", "Horse riders"], answer: 2 },
            { q: "If you see a pedestrian with a white stick and a red band, what does it mean?", options: ["They are blind", "They are deaf", "They are deaf and blind", "They are elderly"], answer: 2 },
            { q: "When are you allowed to use your horn in a built-up area?", options: ["Between 11:30 pm and 7:00 am", "To greet a friend", "When moving to warn others of your presence", "When a vehicle is blocking your path"], answer: 2 },
            { q: "What is the rule for entering a box junction?", options: ["You can enter at any time", "You can only enter if your exit road is clear", "You must stop inside it", "It is for buses only"], answer: 1 },
            { q: "What shape are signs giving orders to tram drivers?", options: ["Circular", "Triangular", "Diamond", "Octagonal"], answer: 2 },
            { q: "If someone is bleeding heavily from an arm, what should you do?", options: ["Give them a drink", "Apply firm pressure to the wound", "Leave it alone", "Tie a tight tourniquet on their neck"], answer: 1 },
            { q: "What is the recommended rate for CPR (chest compressions)?", options: ["60 per minute", "80 per minute", "120 per minute", "150 per minute"], answer: 2 },
            { q: "Your engine overheats while driving. What should you do?", options: ["Open the radiator cap immediately", "Wait until the engine has cooled down before removing the cap", "Pour cold water on the engine", "Keep driving slowly"], answer: 1 },
            { q: "What does an amber traffic light mean?", options: ["Go", "Stop at the stop line", "Prepare to go", "Speed up to clear the junction"], answer: 1 }
        ];

        let currentTestQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let timerInterval = null;
        let timeRemaining = 3420;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startDropdownTest() {
            currentTestQuestions = shuffleArray(questionBank);
            currentQuestionIndex = 0;
            userAnswers = new Array(50).fill(null);
            document.getElementById('active-test-title').innerText = "Mock Exam";
            startTimer();
            renderQuestion();
            showSection('active-test');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeRemaining = 3420;
            timerInterval = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (timeRemaining <= 0) { clearInterval(timerInterval); finishTest(); }
            }, 1000);
        }

        function renderQuestion() {
            const q = currentTestQuestions[currentQuestionIndex];
            document.getElementById('question-tracker').innerText = `Question ${currentQuestionIndex + 1} of 50`;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (userAnswers[currentQuestionIndex] === i ? ' selected' : '');
                btn.innerText = opt;
                btn.onclick = () => { userAnswers[currentQuestionIndex] = i; renderQuestion(); };
                container.appendChild(btn);
            });
            document.getElementById('next-btn').innerText = currentQuestionIndex === 49 ? "Finish Exam" : "Next Question";
        }

        function nextQuestion() {
            if (currentQuestionIndex < 49) { currentQuestionIndex++; renderQuestion(); }
            else finishTest();
        }

        function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; renderQuestion(); } }

        function finishTest() {
            clearInterval(timerInterval);
            let score = 0;
            const container = document.getElementById('incorrect-answers-container');
            container.innerHTML = "";
            currentTestQuestions.forEach((q, i) => {
                if (userAnswers[i] === q.answer) score++;
                else {
                    container.innerHTML += `<div class="result-item"><div class="result-question">Q${i+1}: ${q.q}</div><div class="wrong-answer" style="color:var(--error);">❌ You: ${userAnswers[i] !== null ? q.options[userAnswers[i]] : 'Skipped'}</div><div class="correct-answer" style="color:var(--success);">✅ Correct: ${q.options[q.answer]}</div></div>`;
                }
            });
            document.getElementById('result-summary').innerHTML = `You scored <strong>${score}</strong> out of 50. Status: <strong>${score >= 43 ? 'PASSED' : 'FAILED'}</strong>`;
            showSection('test-results');
        }

        function returnToMenu() { showSection('mock-selection'); }
    </script>
</body>
</html>
